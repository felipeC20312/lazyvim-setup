# vim:fileencoding=utf-8:foldmethod=marker

# === INCLUSÃO DO TEMA ===
# Para usar este tema, coloque o arquivo dark-glassy-elegante-kitty.conf
# no mesmo diretório deste arquivo e descomente a linha abaixo:
# include dark-glassy-elegante-kitty.conf

# Ou copie as configurações de cor diretamente:

# BEGIN_KITTY_THEME
# Dark Glassy Elegante
background #19191C
foreground #CDD6F4
selection_foreground #19191C
selection_background #89B4FA
cursor #CDD6F4
cursor_text_color #19191C
url_color #89B4FA
active_border_color #89B4FA
inactive_border_color #6C7086
bell_border_color #F38E7D
active_tab_foreground #19191C
active_tab_background #89B4FA
inactive_tab_foreground #CDD6F4
inactive_tab_background #1E1E2E
tab_bar_background #1E1E2E

# Paleta de cores (0-15)
color0 #1E1E2E
color1 #6C7086
color2 #A6E3A1
color3 #F9E2AF
color4 #89B4FA
color5 #F38E7D
color6 #94E2D5
color7 #D0CFCC
color8 #6C7086
color9 #EB847D
color10 #A6E3A1
color11 #F9E2AF
color12 #89B4FA
color13 #F38E7D
color14 #94E2D5
color15 #FFFFFF
# END_KITTY_THEME

#: Fonts {{{
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.0
#: }}}

#: Aparência Visual {{{
background_opacity 0.95
dynamic_background_opacity yes
background_blur 20

# O window-colorspace do Ghostty corresponde a macos_colorspace no Kitty
# Para macOS, use display-p3 para cores mais vibrantes:
# macos_colorspace displayp3

# Para garantir que texto em negrito use cores brilhantes
# (equivalente ao bold-is-bright do Ghostty):
# Isso é o comportamento padrão do Kitty, mas pode ser forçado com:
# Não há opção exata, mas o Kitty já faz isso por padrão
#: }}}

#: Cursor customization {{{
cursor_shape block
cursor_blink_interval 0
#: }}}

#: Scrollback {{{
scrollback_lines 10000
#: }}}

#: Mouse {{{
url_style curly
open_url_with default
detect_urls yes
#: }}}

#: Window layout {{{
remember_window_size yes
initial_window_width 640
initial_window_height 400
window_border_width 0.5pt
window_padding_width 4
#: }}}

#: Tab bar {{{
tab_bar_edge bottom
tab_bar_style fade
tab_bar_min_tabs 2
#: }}}

#: Advanced {{{
shell .
editor .
allow_remote_control no
#: }}}

#: OS specific tweaks {{{
# Para Linux com Wayland
wayland_titlebar_color system

# Para macOS
macos_titlebar_color system
macos_option_as_alt no
macos_quit_when_last_window_closed no
#: }}}

#: Keyboard shortcuts {{{
kitty_mod ctrl+shift

# Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard

# Scrolling
map kitty_mod+up scroll_line_up
map kitty_mod+down scroll_line_down
map kitty_mod+page_up scroll_page_up
map kitty_mod+page_down scroll_page_down
map kitty_mod+home scroll_home
map kitty_mod+end scroll_end

# Window management
map kitty_mod+enter new_window
map kitty_mod+w close_window
map kitty_mod+] next_window
map kitty_mod+[ previous_window

# Tab management
map kitty_mod+t new_tab_with_cwd
map kitty_mod+q close_tab
map kitty_mod+right next_tab
map kitty_mod+left previous_tab

# Font sizes
map kitty_mod+equal change_font_size all +2.0
map kitty_mod+minus change_font_size all -2.0
map kitty_mod+backspace change_font_size all 0

# Miscellaneous
map kitty_mod+f5 load_config_file
map kitty_mod+f11 toggle_fullscreen
#: }}}
